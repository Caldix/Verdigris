<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RhymeTime</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Lato', sans-serif;
            color: #fff;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f9a8d4, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #a5b4fc;
            margin-bottom: 20px;
            font-style: italic;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* LANGUAGE SELECTOR */
        .lang-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .lang-btn {
            padding: 8px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-family: 'Lato', sans-serif;
            background: rgba(255,255,255,0.05);
            color: #fff;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #c084fc, #818cf8);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(192, 132, 252, 0.4);
        }

        .lang-flag {
            font-size: 1.2em;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-family: 'Lato', sans-serif;
            transition: all 0.3s;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #c084fc, #818cf8);
            color: #fff;
            box-shadow: 0 4px 15px rgba(192, 132, 252, 0.4);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* GAME AREA */
        .game-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .title-section {
            margin-bottom: 25px;
        }

        .title-section label {
            display: block;
            color: #c084fc;
            margin-bottom: 8px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .title-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(192, 132, 252, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1.2em;
            font-family: 'Playfair Display', serif;
            outline: none;
            transition: border 0.3s;
        }

        .title-input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 10px rgba(192, 132, 252, 0.2);
        }

        .title-input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        /* VERSURI */
        .verses-container {
            margin-bottom: 20px;
        }

        .verse {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verse-number {
            min-width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75em;
            font-weight: bold;
            margin-top: 12px;
        }

        .verse-number.generated {
            background: linear-gradient(135deg, #f9a8d4, #c084fc);
            color: #1a1a2e;
        }

        .verse-number.user {
            background: linear-gradient(135deg, #6ee7b7, #3b82f6);
            color: #1a1a2e;
        }

        .verse-text {
            flex: 1;
            padding: 10px 15px;
            border-radius: 10px;
            font-family: 'Playfair Display', serif;
            font-size: 1em;
            line-height: 1.6;
        }

        .verse-text.generated {
            background: rgba(249, 168, 212, 0.1);
            border-left: 3px solid #f9a8d4;
            color: #f9a8d4;
            font-style: italic;
        }

        .verse-text.user-written {
            background: rgba(110, 231, 183, 0.1);
            border-left: 3px solid #6ee7b7;
            color: #6ee7b7;
        }

        /* INPUT AREA */
        .input-area {
            margin-bottom: 20px;
        }

        .input-label {
            color: #a5b4fc;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .verse-input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(129, 140, 248, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            font-family: 'Playfair Display', serif;
            outline: none;
            transition: border 0.3s;
            resize: none;
            height: 60px;
        }

        .verse-input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.2);
        }

        .verse-input::placeholder {
            color: rgba(255,255,255,0.3);
            font-style: italic;
        }

        /* RIME */
        .rime-section {
            margin-bottom: 20px;
        }

        .rime-label {
            color: #fbbf24;
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rime-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .rime-tag {
            padding: 5px 12px;
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 20px;
            color: #fbbf24;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Playfair Display', serif;
        }

        .rime-tag:hover {
            background: rgba(251, 191, 36, 0.3);
            transform: translateY(-2px);
        }

        /* PROGRESS */
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f9a8d4, #c084fc, #818cf8);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .progress-text {
            text-align: center;
            color: #a5b4fc;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        /* BUTTONS */
        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-family: 'Lato', sans-serif;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #c084fc, #818cf8);
            color: #fff;
            box-shadow: 0 4px 15px rgba(192, 132, 252, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(192, 132, 252, 0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #6ee7b7, #3b82f6);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(110, 231, 183, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(110, 231, 183, 0.5);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        /* FINAL POEM */
        .final-poem {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .final-poem h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #f9a8d4, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .final-poem .poem-lines {
            margin: 20px 0;
            text-align: left;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .final-poem .poem-line {
            font-family: 'Playfair Display', serif;
            font-size: 1.1em;
            line-height: 2;
        }

        .final-poem .poem-line.gen {
            color: #f9a8d4;
            font-style: italic;
        }

        .final-poem .poem-line.usr {
            color: #6ee7b7;
        }

        /* SAVED POEMS */
        .saved-poems {
            display: grid;
            gap: 20px;
        }

        .poem-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }

        .poem-card:hover {
            border-color: rgba(192, 132, 252, 0.4);
            box-shadow: 0 4px 20px rgba(192, 132, 252, 0.1);
        }

        .poem-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .poem-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            color: #c084fc;
        }

        .poem-card-meta {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .poem-card-date {
            font-size: 0.8em;
            color: #64748b;
        }

        .poem-card-lang {
            font-size: 0.8em;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(192, 132, 252, 0.2);
            color: #c084fc;
        }

        .poem-card-lines {
            font-family: 'Playfair Display', serif;
            line-height: 1.8;
            color: #cbd5e1;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        .poem-card-line.gen {
            color: #f9a8d4;
            font-style: italic;
        }

        .poem-card-line.usr {
            color: #6ee7b7;
        }

        .poem-card-actions {
            display: flex;
            gap: 8px;
        }

        .no-poems {
            text-align: center;
            color: #64748b;
            padding: 40px;
            font-style: italic;
        }

        /* NOTIFICATION */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6ee7b7, #3b82f6);
            color: #1a1a2e;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: translateY(100px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .notification.show {
            transform: translateY(0);
        }

        .decoration {
            position: fixed;
            pointer-events: none;
            opacity: 0.05;
            font-size: 15em;
            z-index: 0;
        }

        .dec1 { top: -50px; right: -50px; }
        .dec2 { bottom: -50px; left: -50px; }
    </style>
</head>
<body>

<div class="decoration dec1">✍️</div>
<div class="decoration dec2">🌸</div>

<div class="container">
    <h1 id="main-title">✨ RhymeTime ✨</h1>
    <p class="subtitle" id="main-subtitle">Where every line finds its rhyme</p>

    <!-- LANGUAGE SELECTOR -->
    <div class="lang-selector">
        <button class="lang-btn active" id="lang-ro" onclick="setLanguage('ro')">
            <span class="lang-flag">🇷🇴</span> Română
        </button>
        <button class="lang-btn" id="lang-en" onclick="setLanguage('en')">
            <span class="lang-flag">🇬🇧</span> English
        </button>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" id="tab-btn-game" onclick="switchTab('game', event)">
            ✍️ <span id="tab-write-label">Scrie Poezie</span>
        </button>
        <button class="tab-btn" id="tab-btn-saved" onclick="switchTab('saved', event)">
            📚 <span id="tab-saved-label">Poeziile Mele</span>
        </button>
    </div>

    <!-- GAME TAB -->
    <div id="tab-game" class="tab-content active">
        <div class="game-card">

            <div class="title-section">
                <label id="title-label">📌 Titlul poeziei</label>
                <input type="text" class="title-input" id="poem-title"
                    placeholder="Dă un titlu poeziei tale...">
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <p class="progress-text" id="progress-text">Vers 0 din 8</p>

            <div class="verses-container" id="verses-container"></div>

            <div class="rime-section" id="rime-section" style="display:none">
                <p class="rime-label" id="rime-label">💡 Sugestii de rimă</p>
                <div class="rime-tags" id="rime-tags"></div>
            </div>

            <div class="input-area" id="input-area">
                <p class="input-label" id="input-label">Apasă "Începe" pentru a porni jocul</p>
                <textarea
                    class="verse-input"
                    id="verse-input"
                    placeholder="Scrie versul tău aici..."
                    disabled
                ></textarea>
            </div>

            <div class="buttons" id="buttons">
                <button class="btn btn-primary" id="start-btn" onclick="startGame()">
                    🌟 Începe Poezia
                </button>
            </div>

            <div class="final-poem" id="final-poem">
                <h2 id="final-title"></h2>
                <p id="final-subtitle" style="color: #a5b4fc; margin-bottom: 10px; font-style: italic;">
                    Poezia ta e gata! 🎉
                </p>
                <div class="poem-lines" id="final-lines"></div>
                <div class="buttons" style="justify-content: center; margin-top: 20px;">
                    <button class="btn btn-success" onclick="savePoem()">
                        💾 <span id="btn-save-label">Salvează Poezia</span>
                    </button>
                    <button class="btn btn-secondary" onclick="copyPoem()">
                        📋 <span id="btn-copy-label">Copiază</span>
                    </button>
                    <button class="btn btn-primary" onclick="newPoem()">
                        ✨ <span id="btn-new-label">Poezie Nouă</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- SAVED TAB -->
    <div id="tab-saved" class="tab-content">
        <div id="saved-poems-container">
            <p class="no-poems" id="no-poems-text">
                Nu ai poezii salvate încă. Scrie prima ta poezie! 🌸
            </p>
        </div>
    </div>

</div>

<div class="notification" id="notification"></div>

const templatesEN = [

// ===== STATE =====
let currentLang = 'ro';
let gameState = {
    active: false,
    currentVerse: 0,
    totalVerses: 8,
    verses: [],
    currentPoem: null
};

// ===== FUNCȚII LIMBĂ =====
function setLanguage(lang) {
    currentLang = lang;

    document.getElementById('lang-ro').classList.toggle('active', lang === 'ro');
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');

    const tr = translations[lang];

    document.getElementById('main-title').textContent = tr.mainTitle;
    document.getElementById('main-subtitle').textContent = tr.subtitle;
    document.getElementById('tab-write-label').textContent = tr.tabWrite;
    document.getElementById('tab-saved-label').textContent = tr.tabSaved;
    document.getElementById('title-label').textContent = tr.titleLabel;
    document.getElementById('poem-title').placeholder = tr.titlePlaceholder;
    document.getElementById('rime-label').textContent = tr.rimeLabel;
    document.getElementById('verse-input').placeholder = tr.inputPlaceholder;
    document.getElementById('final-subtitle').textContent = tr.finalSubtitle;
    document.getElementById('btn-save-label').textContent = tr.saveBtn;
    document.getElementById('btn-copy-label').textContent = tr.copyBtn;
    document.getElementById('btn-new-label').textContent = tr.newBtn;
    document.getElementById('no-poems-text').textContent = tr.noPoems;

    if (!gameState.active) {
        document.getElementById('input-label').textContent = tr.startLabel;
        const startBtn = document.getElementById('start-btn');
        if (startBtn) startBtn.textContent = tr.startBtn;
    }

    document.getElementById('progress-text').textContent =
        tr.progressText
            .replace('{current}', gameState.currentVerse)
            .replace('{total}', gameState.totalVerses);

    loadSavedPoems();
}

function tr(key, replacements = {}) {
    let text = translations[currentLang][key] || key;
    Object.entries(replacements).forEach(([k, v]) => {
        text = text.replace(`{${k}}`, v);
    });
    return text;
}

// ===== HELPER =====
function getRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function getAllWords(type) {
    const wordSet = currentLang === 'ro' ? wordsRO : wordsEN;
    const key = currentLang === 'ro' ? type : (
        type === 'substantive' ? 'nouns' :
        type === 'adjective' ? 'adjectives' :
        type === 'verbe' ? 'verbs' : type
    );
    let all = [];
    Object.values(wordSet).forEach(cat => {
        if (cat[key]) all = all.concat(cat[key]);
    });
    return all;
}

function generateVerse() {
    const templates = currentLang === 'ro' ? templatesRO : templatesEN;
    const template = getRandom(templates);

    const allNouns = getAllWords('substantive');
    const allAdj = getAllWords('adjective');
    const allVerbs = getAllWords('verbe');

    let verse = template
        .replace(/{subst}/g, () => getRandom(allNouns))
        .replace(/{noun}/g, () => getRandom(allNouns))
        .replace(/{adj}/g, () => getRandom(allAdj))
        .replace(/{verb}/g, () => getRandom(allVerbs));

    verse = verse.charAt(0).toUpperCase() + verse.slice(1);
    return verse;
}

function getRimes(verse) {
    const rimeDB = currentLang === 'ro' ? rimeRO : rimeEN;
    const wordsInVerse = verse.toLowerCase().split(' ');
    const lastWord = wordsInVerse[wordsInVerse.length - 1].replace(/[,!?.]/, '');

    for (let key in rimeDB) {
        if (key !== 'default' && (lastWord.includes(key) || key.includes(lastWord))) {
            return rimeDB[key];
        }
    }
    return rimeDB['default'].sort(() => Math.random() - 0.5).slice(0, 6);
}

// ===== GAME =====
function startGame() {
    gameState.active = true;
    gameState.currentVerse = 0;
    gameState.verses = [];

    const startBtn = document.getElementById('start-btn');
    if (startBtn) startBtn.style.display = 'none';

    document.getElementById('verse-input').disabled = false;
    document.getElementById('verses-container').innerHTML = '';
    document.getElementById('final-poem').style.display = 'none';

    generateAndShowVerse();
}

function generateAndShowVerse() {
    const verse = generateVerse();
    gameState.verses.push({ text: verse, type: 'generated' });
    gameState.currentVerse++;

    addVerseToUI(verse, 'generated', gameState.currentVerse);
    updateProgress();

    if (gameState.currentVerse < gameState.totalVerses) {
        document.getElementById('input-label').textContent =
            tr('verseLabel', { num: gameState.currentVerse + 1 });

        const rimes = getRimes(verse);
        showRimes(rimes);

        document.getElementById('verse-input').value = '';
        document.getElementById('verse-input').focus();

        document.getElementById('buttons').innerHTML = `
            <button class="btn btn-primary" onclick="submitVerse()">${tr('addVerseBtn')}</button>
            <button class="btn btn-secondary" onclick="skipVerse()">${tr('skipBtn')}</button>
            <button class="btn btn-danger" onclick="resetGame()">${tr('resetBtn')}</button>
        `;
    }
}

function submitVerse() {
    const input = document.getElementById('verse-input');
    const userVerse = input.value.trim();

    if (!userVerse) {
        showNotification(tr('notifEmpty'));
        return;
    }

    gameState.verses.push({ text: userVerse, type: 'user' });
    gameState.currentVerse++;

    addVerseToUI(userVerse, 'user', gameState.currentVerse);
    updateProgress();

    document.getElementById('rime-section').style.display = 'none';

    if (gameState.currentVerse >= gameState.totalVerses) {
        finishPoem();
    } else {
        generateAndShowVerse();
    }
}

function skipVerse() {
    gameState.verses.push({ text: "...", type: 'user' });
    gameState.currentVerse++;

    addVerseToUI("...", 'user', gameState.currentVerse);
    updateProgress();

    document.getElementById('rime-section').style.display = 'none';

    if (gameState.currentVerse >= gameState.totalVerses) {
        finishPoem();
    } else {
        generateAndShowVerse();
    }
}

function addVerseToUI(text, type, number) {
    const container = document.getElementById('verses-container');
    const div = document.createElement('div');
    div.className = 'verse';
    div.innerHTML = `
        <div class="verse-number ${type}">${number}</div>
        <div class="verse-text ${type === 'generated' ? 'generated' : 'user-written'}">${text}</div>
    `;
    container.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showRimes(rimes) {
    const section = document.getElementById('rime-section');
    const tags = document.getElementById('rime-tags');

    section.style.display = 'block';
    tags.innerHTML = '';

    rimes.slice(0, 8).forEach(rime => {
        const tag = document.createElement('span');
        tag.className = 'rime-tag';
        tag.textContent = rime;
        tag.onclick = () => {
            const input = document.getElementById('verse-input');
            input.value += (input.value ? ' ' : '') + rime;
            input.focus();
        };
        tags.appendChild(tag);
    });
}

function updateProgress() {
    const percent = (gameState.currentVerse / gameState.totalVerses) * 100;
    document.getElementById('progress-fill').style.width = percent + '%';
    document.getElementById('progress-text').textContent =
        tr('progressText', { current: gameState.currentVerse, total: gameState.totalVerses });
}

function finishPoem() {
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('rime-section').style.display = 'none';
    document.getElementById('buttons').innerHTML = '';

    const title = document.getElementById('poem-title').value ||
        (currentLang === 'ro' ? 'Poezia Mea' : 'My Poem');

    const finalPoem = document.getElementById('final-poem');
    finalPoem.style.display = 'block';

    document.getElementById('final-title').textContent = title;
    document.getElementById('final-subtitle').textContent = tr('finalSubtitle');

    const linesContainer = document.getElementById('final-lines');
    linesContainer.innerHTML = '';

    gameState.verses.forEach(verse => {
        const p = document.createElement('p');
        p.className = `poem-line ${verse.type === 'generated' ? 'gen' : 'usr'}`;
        p.textContent = verse.text;
        linesContainer.appendChild(p);
    });

    gameState.currentPoem = {
        title: title,
        verses: gameState.verses,
        date: new Date().toLocaleDateString(currentLang === 'ro' ? 'ro-RO' : 'en-GB'),
        lang: currentLang
    };
}

function savePoem() {
    if (!gameState.currentPoem) return;

    const saved = JSON.parse(localStorage.getItem('rhymetime_poems') || '[]');
    saved.unshift(gameState.currentPoem);
    localStorage.setItem('rhymetime_poems', JSON.stringify(saved));

    showNotification(tr('notifSaved'));
    loadSavedPoems();
}

function copyPoem() {
    if (!gameState.currentPoem) return;

    const title = gameState.currentPoem.title;
    const text = gameState.currentPoem.verses.map(v => v.text).join('\n');
    const full = `${title}\n\n${text}`;

    navigator.clipboard.writeText(full).then(() => {
        showNotification(tr('notifCopied'));
    });
}

function newPoem() {
    gameState = {
        active: false,
        currentVerse: 0,
        totalVerses: 8,
        verses: [],
        currentPoem: null
    };

    document.getElementById('verses-container').innerHTML = '';
    document.getElementById('final-poem').style.display = 'none';
    document.getElementById('input-area').style.display = 'block';
    document.getElementById('poem-title').value = '';
    document.getElementById('verse-input').disabled = true;
    document.getElementById('verse-input').value = '';
    document.getElementById('rime-section').style.display = 'none';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-text').textContent =
        tr('progressText', { current: 0, total: 8 });
    document.getElementById('input-label').textContent = tr('startLabel');
    document.getElementById('buttons').innerHTML = `
        <button class="btn btn-primary" id="start-btn" onclick="startGame()">
            ${tr('startBtn')}
        </button>
    `;
}

function resetGame() {
    if (confirm(tr('confirmReset'))) {
        newPoem();
    }
}

// ===== SAVED POEMS =====
function loadSavedPoems() {
    const saved = JSON.parse(localStorage.getItem('rhymetime_poems') || '[]');
    const container = document.getElementById('saved-poems-container');

    if (saved.length === 0) {
        container.innerHTML = `<p class="no-poems">${tr('noPoems')}</p>`;
        return;
    }

    container.innerHTML = '<div class="saved-poems">' +
        saved.map((poem, index) => `
            <div class="poem-card" id="poem-card-${index}">
                <div class="poem-card-header">
                    <span class="poem-card-title">${poem.title}</span>
                    <div class="poem-card-meta">
                        <span class="poem-card-lang">
                            ${poem.lang === 'en' ? '🇬🇧 EN' : '🇷🇴 RO'}
                        </span>
                        <span class="poem-card-date">📅 ${poem.date}</span>
                    </div>
                </div>
                <div class="poem-card-lines">
                    ${poem.verses.map(v =>
                        `<div class="poem-card-line ${v.type === 'generated' ? 'gen' : 'usr'}">
                            ${v.text}
                        </div>`
                    ).join('')}
                </div>
                <div class="poem-card-actions">
                    <button class="btn btn-secondary" onclick="copyPoemByIndex(${index})">
                        ${tr('copyCardBtn')}
                    </button>
                    <button class="btn btn-danger" onclick="deletePoem(${index})">
                        ${tr('deleteCardBtn')}
                    </button>
                </div>
            </div>
        `).join('') +
    '</div>';
}

function copyPoemByIndex(index) {
    const saved = JSON.parse(localStorage.getItem('rhymetime_poems') || '[]');
    const poem = saved[index];
    const text = `${poem.title}\n\n${poem.verses.map(v => v.text).join('\n')}`;
    navigator.clipboard.writeText(text).then(() => {
        showNotification(tr('notifCopied'));
    });
}

function deletePoem(index) {
    if (confirm(tr('confirmDelete'))) {
        const saved = JSON.parse(localStorage.getItem('rhymetime_poems') || '[]');
        saved.splice(index, 1);
        localStorage.setItem('rhymetime_poems', JSON.stringify(saved));
        loadSavedPoems();
        showNotification(tr('notifDeleted'));
    }
}

// ===== TABS =====
function switchTab(tab, event) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    document.getElementById(`tab-${tab}`).classList.add('active');
    event.currentTarget.classList.add('active');

    if (tab === 'saved') loadSavedPoems();
}

// ===== NOTIFICATION =====
function showNotification(message) {
    const notif = document.getElementById('notification');
    notif.textContent = message;
    notif.classList.add('show');
    setTimeout(() => notif.classList.remove('show'), 3000);
}

// ===== ENTER KEY =====
document.getElementById('verse-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitVerse();
    }
});

// ===== INIT =====
loadSavedPoems();
</script>
